version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: diena_app
    ports:
      - "8000:8000"
      - "5173:5173"
    volumes:
      - .:/var/www
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=diena_parfum
      - DB_USERNAME=root
      - DB_PASSWORD=root
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: diena_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: diena_parfum
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
      # Baris di bawah ini yang bertugas me-load otomatis file .sql kamu
      - ./docker-db-init:/docker-entrypoint-initdb.d

volumes:
  db_data: